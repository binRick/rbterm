name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            asset_name: rbterm-linux-x86_64.zip
            build_subdir: build
            binary_name: rbterm
            cmake_extra: ""
          - os: macos-latest
            platform: macos-arm64
            asset_name: rbterm-macos-arm64.zip
            build_subdir: build
            binary_name: rbterm
            cmake_extra: ""
          # Two Windows variants — same source, only difference is
          # whether ffmpeg.exe (~200 MB) is baked into the .rsrc
          # section. The "full" build is one self-contained ~227 MB
          # exe; the "slim" build is ~24 MB and falls through to
          # PATH for mp4/webm/apng (gif/webp/cast/txt still work
          # natively in either build).
          - os: windows-latest
            platform: windows-x86_64
            asset_name: rbterm-windows-x86_64.zip
            build_subdir: build/Release
            binary_name: rbterm.exe
            cmake_extra: "-DRBTERM_SSH=OFF"
            embed_ffmpeg: true
          - os: windows-latest
            platform: windows-x86_64-slim
            asset_name: rbterm-windows-x86_64-slim.zip
            build_subdir: build/Release
            binary_name: rbterm.exe
            cmake_extra: "-DRBTERM_SSH=OFF"
            embed_ffmpeg: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        # libwebp-dev gets us the native WebP encoder; without it
        # the stub builds and recording's WebP output would be inert.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config zip \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libssh-dev libwebp-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        # libssh + webp are the non-system deps; raylib, mbedtls are
        # FetchContent'd from source. Frameworks (Cocoa, IOKit,
        # OpenGL, CoreVideo, CoreText, CoreGraphics) are provided by
        # the OS, the bundled font assembly uses clang's built-in
        # assembler so no extra tools needed.
        run: brew install libssh webp

      # Stage ffmpeg.exe BEFORE configure so the resource compiler
      # can bake it into rbterm.exe as RCDATA. The CMake config
      # checks for assets/ffmpeg/ffmpeg.exe and adds the .rc to the
      # build inputs only when present. ffmpeg_embedded_extract()
      # at runtime materialises this blob to %TEMP% on first use,
      # so users get one self-contained rbterm.exe instead of an
      # exe + 200 MB sidecar. BtbN's gpl-static build is a single
      # self-contained ffmpeg.exe with everything we need (libx264,
      # libvpx, apng).
      - name: Stage ffmpeg.exe for embedding (Windows full build)
        if: matrix.os == 'windows-latest' && matrix.embed_ffmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ffmpeg" -Force
          $exe = Get-ChildItem -Path "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter "ffmpeg.exe" |
                 Select-Object -First 1
          if (-not $exe) { throw "ffmpeg.exe not found in BtbN archive" }
          New-Item -ItemType Directory -Force -Path "assets\ffmpeg" | Out-Null
          Copy-Item -Path $exe.FullName -Destination "assets\ffmpeg\ffmpeg.exe"
          $size = (Get-Item "assets\ffmpeg\ffmpeg.exe").Length
          Write-Host ("ffmpeg.exe staged at assets/ffmpeg/ ({0:N0} bytes)" -f $size)

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p pkg out
          cp "${{ matrix.build_subdir }}/${{ matrix.binary_name }}" "pkg/${{ matrix.binary_name }}"
          # Fonts are embedded into the binary (.incbin on Linux,
          # RCDATA resources on Windows) so no fonts/ folder ships
          # alongside the exe. Likewise ffmpeg.exe is embedded as
          # RCDATA on Windows — see "Stage ffmpeg.exe for embedding"
          # above. No sidecar binaries ship in the zip.

      - name: Self-sign Windows binary
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Self-signed cert so the exe isn't "completely unsigned". Won't
          # silence SmartScreen (no publisher reputation) but the Signature
          # tab shows a valid signer and users can import the cert into
          # Trusted Publishers to bypass warnings permanently.
          $cert = New-SelfSignedCertificate `
              -Subject "CN=rbterm CI (binRick)" `
              -Type CodeSigning `
              -KeyAlgorithm RSA -KeyLength 2048 `
              -CertStoreLocation Cert:\CurrentUser\My `
              -NotAfter (Get-Date).AddYears(3)
          Set-AuthenticodeSignature `
              -FilePath "pkg\${{ matrix.binary_name }}" `
              -Certificate $cert `
              -HashAlgorithm SHA256 `
              -TimestampServer "http://timestamp.digicert.com"
          (Get-AuthenticodeSignature "pkg\${{ matrix.binary_name }}") | Format-List Status, SignerCertificate

      - name: Create release archive
        shell: bash
        run: |
          cd pkg
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath '../out/${{ matrix.asset_name }}' -Force"
          else
            zip -r "../out/${{ matrix.asset_name }}" .
          fi
          ls -la ../out/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: out/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
